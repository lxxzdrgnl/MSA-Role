<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>관리자 대시보드</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-jp-dynamic-subset.min.css" />
    <style>
      :root {
        /* Surface palette — warm charcoal layers */
        --bg-base: #111110;
        --bg-surface: #1a1918;
        --bg-elevated: #222120;
        --bg-hover: #2d2c2a;
        --bg-active: #353432;
        --bg-input: #1a1918;

        /* Text — warm whites */
        --text-primary: #ede8df;
        --text-secondary: #9c9589;
        --text-muted: #5c5750;
        --text-inverse: #111110;

        /* Accent colors */
        --accent-brass: #d4863c;
        --accent-brass-glow: rgba(212, 134, 60, 0.15);
        --accent-brass-border: rgba(212, 134, 60, 0.25);

        /* Status colors — 3-tone: accent (active), neutral (done), danger (cancelled) */
        --status-active-bg: rgba(212, 134, 60, 0.12);
        --status-active-text: #d4863c;
        --status-done-bg: rgba(156, 149, 137, 0.10);
        --status-done-text: #9c9589;
        --status-danger-bg: rgba(200, 120, 100, 0.12);
        --status-danger-text: #C87864;

        /* Semantic */
        --success: #d4863c;
        --success-bg: rgba(212, 134, 60, 0.10);
        --danger: #C87864;
        --danger-bg: rgba(200, 120, 100, 0.10);

        /* Border */
        --border: rgba(255, 255, 255, 0.06);
        --border-subtle: rgba(255, 255, 255, 0.04);
        --border-strong: rgba(255, 255, 255, 0.10);

        /* Radius */
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 14px;
        --radius-xl: 20px;

        /* Shadows */
        --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
        --shadow-md: 0 4px 16px rgba(0,0,0,0.3);
        --shadow-lg: 0 12px 40px rgba(0,0,0,0.4);
        --shadow-glow: 0 0 20px rgba(212, 134, 60, 0.08);

        /* Transitions */
        --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);

        /* Sidebar */
        --sidebar-width: 240px;
      }

      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        background: var(--bg-base);
        color: var(--text-primary);
        line-height: 1.5;
      }

      /* Scrollbar styling */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.08);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255,255,255,0.14);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
