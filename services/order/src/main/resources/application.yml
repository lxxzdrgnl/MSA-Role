server:
  port: 8083

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:sqlite:/data/order.db
    driver-class-name: org.sqlite.JDBC
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

app:
  menu-service-url: ${MENU_SERVICE_URL:http://localhost:8082}
  gateway-url: ${GATEWAY_URL:http://localhost:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
