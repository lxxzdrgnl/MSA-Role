server:
  port: 8084

spring:
  application:
    name: review-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  datasource:
    url: jdbc:sqlite:/data/review.db
    driver-class-name: org.sqlite.JDBC
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:8081}

ai:
  review-writer:
    url: ${AI_REVIEW_WRITER_URL:http://ai-review-writer:8002}
  recommendation:
    url: ${AI_RECOMMENDATION_URL:http://ai-recommendation:8001}
  validation:
    url: ${AI_VALIDATION_URL:http://ai-validation:8004}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
